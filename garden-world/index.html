<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的花园世界 🌻</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- 顶部状态栏 -->
        <header id="top-bar">
            <div class="logo">🌻 我的花园世界</div>
            <div class="stats">
                <span class="coins">💰 <span id="coin-count">100</span></span>
                <span class="level">⭐ 等级 <span id="player-level">1</span></span>
                <span class="day">📅 第 <span id="day-count">1</span> 天</span>
                <span class="energy">⚡ 体力 <span id="energy-count">100</span>/100</span>
            </div>
        </header>

        <!-- 游戏主画面 -->
        <main id="game-screen">
            <div id="garden-container">
                <!-- 天空 -->
                <div class="sky">
                    <div class="sun"></div>
                    <div class="cloud cloud-1"></div>
                    <div class="cloud cloud-2"></div>
                    <div class="cloud cloud-3"></div>
                </div>
                
                <!-- 花园格子 -->
                <div id="garden-grid" class="garden-grid"></div>
                
                <!-- 商店/背包面板 -->
                <div id="shop-panel" class="side-panel">
                    <div class="panel-header">🏪 商店</div>
                    <div class="panel-content" id="shop-content"></div>
                </div>
                
                <div id="inventory-panel" class="side-panel">
                    <div class="panel-header">🎒 背包</div>
                    <div class="panel-content" id="inventory-content"></div>
                </div>
            </div>
        </main>

        <!-- 底部工具栏 -->
        <footer id="bottom-bar">
            <div class="tools">
                <button class="tool-btn active" data-tool="water">💧 浇水</button>
                <button class="tool-btn" data-tool="plant">🌱 种植</button>
                <button class="tool-btn" data-tool="harvest">✂️ 收获</button>
                <button class="tool-btn" data-tool="remove">🪓 清除</button>
            </div>
            <div class="actions">
                <button id="btn-next-day" class="action-btn">🌙 下一天</button>
                <button id="btn-save" class="action-btn">💾 保存</button>
                <button id="btn-stats" class="action-btn">📊 统计</button>
            </div>
        </footer>

        <!-- 弹窗容器 -->
        <div id="modal-container" class="hidden"></div>
        
        <!-- 消息提示 -->
        <div id="message-container"></div>
    </div>

    <!-- 游戏脚本 -->
    <script src="js/utils.js"></script>
    <script src="js/data/plantsData.js"></script>
    <script src="js/data/itemsData.js"></script>
    <script src="js/GameState.js"></script>
    <script src="js/UI.js"></script>
    <script src="js/Garden.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
