<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宁静钓鱼 - Serene Fishing 🎣</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- 顶部状态栏 -->
        <header id="top-bar">
            <div class="logo">🎣 宁静钓鱼</div>
            <div class="stats">
                <span class="coins">💰 <span id="coin-count">100</span></span>
                <span class="level">⭐ 等级 <span id="player-level">1</span></span>
                <span class="exp">📊 经验 <span id="player-exp">0</span>/<span id="exp-needed">100</span></span>
            </div>
        </header>

        <!-- 游戏主画面 -->
        <main id="game-screen">
            <div id="water-scene">
                <!-- 天空背景 -->
                <div class="sky">
                    <div class="sun"></div>
                    <div class="cloud cloud-1"></div>
                    <div class="cloud cloud-2"></div>
                </div>
                
                <!-- 水面 -->
                <div class="water-surface">
                    <div class="wave wave-1"></div>
                    <div class="wave wave-2"></div>
                    <div class="wave wave-3"></div>
                </div>
                
                <!-- 水下区域 -->
                <div class="underwater">
                    <!-- 浮漂 -->
                    <div id="float" class="float">
                        <div class="float-top"></div>
                        <div class="float-body"></div>
                    </div>
                    
                    <!-- 鱼线 -->
                    <svg id="line-svg" class="fishing-line" width="100%" height="100%">
                        <path id="line-path" d="" stroke="#8B4513" stroke-width="2" fill="none"/>
                    </svg>
                    
                    <!-- 鱼类容器 -->
                    <div id="fish-container"></div>
                </div>
                
                <!-- 岸边 -->
                <div class="shore">
                    <div class="grass grass-1"></div>
                    <div class="grass grass-2"></div>
                    <div class="grass grass-3"></div>
                    <div class="tree"></div>
                </div>
                
                <!-- 钓鱼竿 -->
                <div id="fishing-rod" class="fishing-rod">
                    <div class="rod"></div>
                    <div class="rod-handle"></div>
                </div>
            </div>
            
            <!-- 张力指示器 -->
            <div id="tension-meter" class="tension-meter hidden">
                <div class="tension-bar">
                    <div id="tension-fill" class="tension-fill"></div>
                </div>
                <span class="tension-label">张力</span>
            </div>
            
            <!-- 抛竿力度条 -->
            <div id="cast-meter" class="cast-meter hidden">
                <div class="cast-bar">
                    <div id="cast-fill" class="cast-fill"></div>
                </div>
                <span class="cast-label">抛竿力度</span>
            </div>
        </main>

        <!-- 底部控制栏 -->
        <footer id="bottom-bar">
            <button id="btn-cast" class="control-btn">🎣 抛竿</button>
            <button id="btn-reel" class="control-btn" disabled>⏹️ 收线</button>
            <button id="btn-inventory" class="control-btn">🎒 背包</button>
            <button id="btn-shop" class="control-btn">🏪 商店</button>
            <button id="btn-guide" class="control-btn">📖 图鉴</button>
            <button id="btn-stats" class="control-btn">📊 统计</button>
        </footer>

        <!-- 弹窗容器 -->
        <div id="modal-container" class="hidden"></div>
        
        <!-- 消息提示 -->
        <div id="message-container"></div>
    </div>

    <!-- 游戏脚本 -->
    <script src="js/utils.js"></script>
    <script src="js/data/fishData.js"></script>
    <script src="js/data/equipmentData.js"></script>
    <script src="js/Fish.js"></script>
    <script src="js/Equipment.js"></script>
    <script src="js/GameState.js"></script>
    <script src="js/UI.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
