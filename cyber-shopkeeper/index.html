<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博朋克掌柜 2077 🌃</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- 顶部状态栏 -->
        <header id="top-bar">
            <div class="logo">🌃 赛博朋克掌柜 2077</div>
            <div class="stats">
                <span class="coins">₵ <span id="cash-count">10000</span></span>
                <span class="reputation">⭐ <span id="reputation-count">0</span></span>
                <span class="level">🏆 等级 <span id="player-level">1</span></span>
                <span class="day">📅 第 <span id="day-count">1</span> 天</span>
                <span class="energy">⚡ 体力 <span id="energy-count">100</span></span>
            </div>
        </header>

        <!-- 游戏主画面 -->
        <main id="game-screen">
            <div id="cyber-street">
                <!-- 赛博朋克天空 -->
                <div class="cyber-sky">
                    <div class="neon-sun"></div>
                    <div class="flying-car car-1"></div>
                    <div class="flying-car car-2"></div>
                    <div class="hologram-ad ad-1">🍜 义体拉面</div>
                    <div class="hologram-ad ad-2">⚡ 能量饮料</div>
                </div>
                
                <!-- 街道层 -->
                <div class="street-layer">
                    <!-- 建筑 -->
                    <div class="buildings">
                        <div class="building" id="shop-1" data-shop="noodle">
                            <div class="neon-sign">🍜</div>
                            <div class="shop-name">义体拉面</div>
                            <div class="shop-level">Lv.1</div>
                        </div>
                        <div class="building" id="shop-2" data-shop="clinic">
                            <div class="neon-sign">💊</div>
                            <div class="shop-name">义体诊所</div>
                            <div class="shop-level">Lv.1</div>
                        </div>
                        <div class="building" id="shop-3" data-shop="weapon">
                            <div class="neon-sign">🔫</div>
                            <div class="shop-name">武器商店</div>
                            <div class="shop-level">🔒</div>
                        </div>
                        <div class="building" id="shop-4" data-shop="bar">
                            <div class="neon-sign">🍸</div>
                            <div class="shop-name">霓虹酒吧</div>
                            <div class="shop-level">🔒</div>
                        </div>
                        <div class="building" id="shop-5" data-shop="clothing">
                            <div class="neon-sign">👕</div>
                            <div class="shop-name">光污染时装</div>
                            <div class="shop-level">🔒</div>
                        </div>
                    </div>
                    
                    <!-- 街道 -->
                    <div class="street">
                        <div class="pedestrian ped-1"></div>
                        <div class="pedestrian ped-2"></div>
                        <div class="pedestrian ped-3"></div>
                    </div>
                </div>
            </div>
            
            <!-- 侧边面板 -->
            <div id="panel-shop" class="side-panel">
                <div class="panel-header">🏪 商店管理</div>
                <div class="panel-content" id="shop-content"></div>
            </div>
            
            <div id="panel-staff" class="side-panel">
                <div class="panel-header">👥 员工管理</div>
                <div class="panel-content" id="staff-content"></div>
            </div>
        </main>

        <!-- 底部控制栏 -->
        <footer id="bottom-bar">
            <div class="tools">
                <button class="tool-btn active" data-tool="manage">🏪 管理</button>
                <button class="tool-btn" data-tool="staff">👥 员工</button>
                <button class="tool-btn" data-tool="market">📊 市场</button>
                <button class="tool-btn" data-tool="tasks">📋 任务</button>
            </div>
            <div class="actions">
                <button id="btn-next-day" class="action-btn">🌙 下一天</button>
                <button id="btn-save" class="action-btn">💾 保存</button>
            </div>
        </footer>

        <!-- 弹窗容器 -->
        <div id="modal-container" class="hidden"></div>
        
        <!-- 消息提示 -->
        <div id="message-container"></div>
    </div>

    <!-- 游戏脚本 -->
    <script src="js/utils.js"></script>
    <script src="js/data/shopsData.js"></script>
    <script src="js/data/staffData.js"></script>
    <script src="js/GameState.js"></script>
    <script src="js/UI.js"></script>
    <script src="js/Shop.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
